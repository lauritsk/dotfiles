[settings]
color_theme = "catppuccin"
experimental = true
activate_aggressive = true
pin = true
lockfile = true
# locked = true
install_before = "7d"
trusted_config_paths = [
    '~/projects',
    '/workspaces'
]

[settings.npm]
package_manager = "bun"

[settings.python]
uv_venv_auto = "create|source"

[env]
SHELL = "fish"
EDITOR = "hx"
PAGER = "bat"
BAT_THEME_LIGHT = "Catppuccin Latte"
BAT_THEME_DARK = "Catppuccin Mocha"

[tools]
age = "1.3.1"
bat = "0.26.1"
bun = "1.3.9"
cargo-binstall = "1.17.5"
chezmoi = "2.69.4"
devcontainer-cli = "0.83.2"
fd = "10.3.0"
fnox = "1.13.0"
fzf = "0.68.0"
gh = "2.87.3"
go = "1.26.0"
helix = "25.07.1"
lazydocker = "0.24.4"
lazygit = "0.59.0"
node = "25.7.0"
opencode = "1.2.10"
pitchfork = "1.6.0"
ripgrep = "15.1.0"
starship = "1.24.2"
usage = "2.18.0"
uv = "0.10.4"
yazi = "26.1.22"
zoxide = "0.9.9"

[shell_alias]
cm = "chezmoi"
y = "yazi"
lg = "lazygit"
ld = "lazydocker"
oc = "opencode"
dev = "devcontainer up --dotfiles-repository https://github.com/lauritsk/dotfiles && devcontainer exec --workspace-folder . fish"
dc = "docker compose"
ts = "tailscale"

