[settings]
color_theme = "catppuccin"
experimental = true
activate_aggressive = true
pin = true
lockfile = true
# locked = true
install_before = "7d"
trusted_config_paths = ["~/Projects"]

[settings.npm]
package_manager = "pnpm"

[settings.python]
uv_venv_auto = "create|source"

[settings.age]
key_file = "~/.ssh/age.txt"

[settings.github]
use_git_credentials = true

[env]
MISE_GITHUB_TOKEN = { age = "" }
GITHUB_TOKEN = { age = "" }
DOCKER_HUB_TOKEN = { age = "" }
fish_greeting = ""
fish_key_bindings = "fish_vi_key_bindings"
BAT_THEME_LIGHT = "Catppuccin Latte"
BAT_THEME_DARK = "Catppuccin Mocha"
SHELL = "fish"
EDITOR = "hx"
PAGER = "bat"

[shell_alias]
cm = "chezmoi"
lg = "lazygit"
ld = "lazydocker"
y = "yazi"
oc = "opencode"
ts = "tailscale"
dc = "docker compose"
t = "tmux new-session -A -s main"

[tools]
age = "1.3.1"
atuin = "18.13.3"
bat = "0.26.1"
cargo-binstall = "1.17.8"
chezmoi = "2.70.0"
codex = "0.116.0"
fd = "10.4.2"
fnox = "1.19.0"
fzf = "0.70.0"
gh = "2.88.1"
go = "1.26.1"
gofumpt = "0.9.2"
helix = "25.07.1"
lazydocker = "0.25.0"
lazygit = "0.60.0"
node = "25.8.1"
opencode = "1.3.0"
pnpm = "10.32.1"
python = "3.14.3"
rg = "15.1.0"
rust = "1.94.0"
sqlite = "3.52.0"
starship = "1.24.2"
tmux = "3.6a"
usage = "3.1.0"
usql = "0.21.1"
uv = "0.10.12"
viteplus = "0.1.13"
wrangler = "4.76.0"
yazi = "26.1.22"
zoxide = "0.9.9"
