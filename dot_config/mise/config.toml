[settings]
color_theme = "catppuccin"
experimental = true
activate_aggressive = true
env_shell_expand = true
pin = true
lockfile = true
# locked = true
install_before = "7d"
trusted_config_paths = []

[settings.npm]
package_manager = "pnpm"

[settings.python]
uv_venv_auto = "create|source"

[settings.github]
use_git_credentials = true

[env]
fish_greeting = ""
fish_key_bindings = "fish_vi_key_bindings"
BAT_THEME_LIGHT = "Catppuccin Latte"
BAT_THEME_DARK = "Catppuccin Mocha"
_ZO_DATA_DIR = "$HOME/.local/share/zoxide"
_ZO_EXCLUDE_PATHS = ".git"
_ZO_EXCLUDE_DIRS = "/tmp:/var:/proc:/sys"
SHELL = "fish"
EDITOR = "hx"
PAGER = "bat"
XDG_DATA_HOME = "$HOME/.local/share"
XDG_CONFIG_HOME = "$HOME/.config"
XDG_STATE_HOME = "$HOME/.local/state"
XDG_CACHE_HOME = "$HOME/.cache"

[shell_alias]
ls = "eza --icons=auto --classify=auto --group-directories-first"
la = "eza --icons=auto --classify=auto --group-directories-first --long --all --smart-group --changed --git --git-repos --time-style=relative"
lt = "eza --icons=auto --classify=auto --group-directories-first --tree --level"
cm = "chezmoi"
lg = "lazygit"
ld = "lazydocker"
y = "yazi"
sc = "scooter"
oc = "opencode"
ts = "tailscale"
dc = "docker compose"

[tools]
age = "1.3.1"
atuin = "18.13.6"
bat = "0.26.1"
bottom = "0.12.3"
cargo-binstall = "1.17.9"
chezmoi = "2.70.0"
cosign = "3.0.5"
devcontainer-cli = "0.84.1"
duf = "0.9.1"
eza = "0.23.4"
fd = "10.4.2"
fnox = "1.19.0"
fzf = "0.71.0"
gh = "2.89.0"
gitleaks = "8.30.1"
gitsign = "0.14.0"
helix = "25.07.1"
lazydocker = "0.25.0"
lazygit = "0.60.0"
opencode = "1.3.15"
pnpm = "10.33.0"
rg = "15.1.0"
scooter = "0.9.0"
starship = "1.24.2"
tlrc = "1.13.0"
tmux = "3.6a"
usage = "3.2.0"
uv = "0.11.3"
yazi = "26.1.22"
zoxide = "0.9.9"

[tasks.dev]
tools.devcontainer-cli = "0.84.1"
tools.pnpm = "10.33.0"
tools.gh = "2.89.0"
tools.fzf = "0.71.0"
env.PROJECTS_DIR = "{{env.HOME}}/Projects"
env.DOTFILES_REPOSITORY = "https://github.com/lauritsk/dotfiles.git"
description = "Pick a repo, clone it, and enter its devcontainer"
interactive = true
run = '''
#!/usr/bin/env bash
set -euo pipefail

selected_repo="$(gh repo list \
  --json nameWithOwner,description,isPrivate,pushedAt \
  --jq '.[] | [.nameWithOwner, (if .isPrivate then "private" else "public" end), (.pushedAt // ""), (.description // "")] | @tsv' \
  | fzf \
      --delimiter=$'\t' \
      --with-nth=1,2,4 \
      --prompt="repo> " \
      --header="enter to clone/open, ctrl-c to cancel" \
  | cut -f1)"

if [[ -z "$selected_repo" ]]; then
  echo "No repository selected" >&2
  exit 1
fi

repo_dir="$PROJECTS_DIR/$selected_repo"

mkdir -p "$(dirname "$repo_dir")"

if [[ ! -e "$repo_dir" ]]; then
  echo "Cloning $selected_repo into $repo_dir"
  gh repo clone "$selected_repo" "$repo_dir"
elif ! git -C "$repo_dir" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  echo "Target path exists but is not a git repo: $repo_dir" >&2
  exit 1
fi

if [[ ! -f "$repo_dir/.devcontainer/devcontainer.json" && ! -f "$repo_dir/.devcontainer.json" ]]; then
  echo "No devcontainer found in $selected_repo"
  cd "$repo_dir"
  exec "$SHELL" -il
fi

if ! devcontainer up --workspace-folder "$repo_dir" --dotfiles-repository "$DOTFILES_REPOSITORY"; then
  echo "Devcontainer failed for $selected_repo; starting local shell instead" >&2
  cd "$repo_dir"
  exec "$SHELL" -il
fi

exec devcontainer exec --workspace-folder "$repo_dir" bash -il
'''
