[settings]
color_theme = "catppuccin"
experimental = true
pin = true
lockfile = true
# minimum_release_age = "7d"

[settings.npm]
package_manager = "aube"

[settings.python]
uv_venv_auto = "create|source"

[settings.github]
use_git_credentials = true

[env]
fish_greeting = ""
fish_key_bindings = "fish_vi_key_bindings"
BAT_THEME_LIGHT = "Catppuccin Latte"
BAT_THEME_DARK = "Catppuccin Mocha"
SHELL = "fish"
EDITOR = "hx"
PAGER = "bat"

[shell_alias]
sc = "scooter"
cm = "chezmoi"
lg = "lazygit"
ld = "lazydocker"
ts = "tailscale"
dc = "docker compose"

[tools]
