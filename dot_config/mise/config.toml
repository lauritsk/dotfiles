[settings]
color_theme = "catppuccin"
experimental = true
activate_aggressive = true
env_shell_expand = true
pin = true
lockfile = true
# locked = true
install_before = "7d"
trusted_config_paths = ["~/Projects"]

[settings.npm]
package_manager = "pnpm"

[settings.python]
uv_venv_auto = "create|source"

[settings.age]
key_file = "~/.ssh/age.txt"

[settings.github]
use_git_credentials = true

[env]
MISE_GITHUB_TOKEN = { age = "" }
GITHUB_TOKEN = { age = "" }
DOCKER_HUB_TOKEN = { age = "" }
fish_greeting = ""
fish_key_bindings = "fish_vi_key_bindings"
BAT_THEME_LIGHT = "Catppuccin Latte"
BAT_THEME_DARK = "Catppuccin Mocha"
_ZO_DATA_DIR = "$HOME/.local/share/zoxide"
_ZO_EXCLUDE_PATHS = ".git"
_ZO_EXCLUDE_DIRS = "/tmp:/var:/proc:/sys"
SHELL = "fish"
EDITOR = "hx"
PAGER = "bat"
XDG_DATA_HOME = "$HOME/.local/share"
XDG_CONFIG_HOME = "$HOME/.config"
XDG_STATE_HOME = "$HOME/.local/state"
XDG_CACHE_HOME = "$HOME/.cache"

[shell_alias]
ls = "eza --color=auto --icons=auto"
la = "eza --color=auto --icons=auto --group-directories-first --long --all --smart-group --changed --git --git-repos --time-style=relative"
lt = "eza --color=auto --icons=auto --group-directories-last --recurse --tree --level"
cm = "chezmoi"
lg = "lazygit"
ld = "lazydocker"
y = "yazi"
sc = "scooter"
oc = "opencode"
ts = "tailscale"
dc = "docker compose"
tf = "terraform"
t = "sesh connect $(sesh list | fzf)"
run = "atuin scripts run"

[tools]
age = "1.3.1"
atuin = "18.13.5"
bat = "0.26.1"
cargo-binstall = "1.17.8"
chezmoi = "2.70.0"
codex = "0.116.0"
eza = "0.23.4"
fd = "10.4.2"
fnox = "1.19.0"
fzf = "0.70.0"
gh = "2.88.1"
go = "1.26.1"
gofumpt = "0.9.2"
helix = "25.07.1"
jbang = "0.137.0"
lazydocker = "0.25.0"
lazygit = "0.60.0"
node = "25.8.2"
opencode = "1.3.2"
pnpm = "10.33.0"
python = "3.14.3"
rg = "15.1.0"
rust = "1.94.0"
scooter = "0.9.0"
sqlite = "3.52.0"
starship = "1.24.2"
tmux = "3.6a"
usage = "3.2.0"
usql = "0.21.4"
uv = "0.11.1"
viteplus = "0.1.14"
wrangler = "4.77.0"
yazi = "26.1.22"
zoxide = "0.9.9"
