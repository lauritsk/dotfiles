[settings]
color_theme = "catppuccin"
experimental = true
pin = true
lockfile = true
# locked = true
install_before = "7d"
trusted_config_paths = ["/workspaces"]

[settings.npm]
package_manager = "pnpm"

[settings.python]
uv_venv_auto = "create|source"

[settings.github]
use_git_credentials = true

[env]
fish_greeting = ""
fish_key_bindings = "fish_vi_key_bindings"

[shell_alias]
cm = "chezmoi"
oc = "opencode"

[tools]
chezmoi = "2.70.1"
fd = "10.4.2"
gh = "2.89.0"
gitsign = "0.14.0"
opencode = "1.4.3"
rg = "15.1.0"
usage = "3.2.0"
